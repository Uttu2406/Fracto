<div class="admin-layout">
  <aside class="sidebar">
    <h2 class="sidebar-title">Admin Panel</h2>
    <nav>
      <a routerLink="/admin/users" routerLinkActive="active"><i class="fas fa-users"></i> Users</a>
      <a routerLink="/admin/doctors" routerLinkActive="active"><i class="fas fa-user-doctor"></i> Doctors</a>
      <a routerLink="/admin/specializations" routerLinkActive="active"><i class="fas fa-briefcase-medical"></i> Specializations</a>
      <a routerLink="/admin/appointments" routerLinkActive="active"><i class="fas fa-calendar"></i> Appointments</a>
    </nav>
  </aside>

  <div class="admin-main">
    <div class="page-header">
      <h1 class="page-title"><i class="fas fa-user-doctor"></i> Manage Doctors</h1>
      <button class="btn btn-primary btn-sm" (click)="openAdd()"><i class="fas fa-plus"></i> Add Doctor</button>
    </div>

    <div class="alert alert-success" *ngIf="success">{{ success }}</div>
    <div class="alert alert-danger" *ngIf="error">{{ error }}</div>

    <div class="card" *ngIf="showForm">
      <h3>{{ editingId ? 'Edit Doctor' : 'New Doctor' }}</h3>
      <form [formGroup]="form" (ngSubmit)="save()">
        <div class="form-grid">
          <div class="form-group">
            <label>Name</label>
            <input class="form-control" formControlName="name" />
          </div>
          <div class="form-group">
            <label>City</label>
            <input class="form-control" formControlName="city" />
          </div>
          <div class="form-group">
            <label>Specialization</label>
            <select class="form-control" formControlName="specializationId">
              <option [value]="null">Select Specialization...</option>
              <option *ngFor="let s of specializations" [value]="s.specializationId">
                {{ s.specializationName }}
              </option>
            </select>
          </div>

          <div class="form-group" *ngIf="editingId">
            <label>Profile Image</label>
            <input type="file" class="form-control" (change)="onFileSelected($event)" accept="image/*" />
            <div *ngIf="imagePreview" style="margin-top: 8px;">
              <img [src]="imagePreview" style="width: 80px; height: 80px; border-radius: 50%; object-fit: cover;" />
            </div>
          </div>

        </div>
        <div style="margin-top: 1rem; display: flex; gap: 0.5rem;">
          <button class="btn btn-success btn-sm" type="submit">Save</button>
          <button class="btn btn-secondary btn-sm" type="button" (click)="showForm = false">Cancel</button>
        </div>
      </form>
    </div>

    <div class="card">
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Name</th>
              <th>City</th>
              <th>Specialization</th>
              <th>Rating</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let d of doctors">
              <td>{{ d.doctorId }}</td>
              <td>{{ d.name }}</td>
              <td>{{ d.city }}</td>
              <td>{{ getSpecName(d.specializationId) }}</td>
              <td>
                <span *ngIf="d.rating"><i class="fas fa-star" style="color: #fbbf24;"></i> {{ d.rating }}</span>
                <span class="muted" *ngIf="!d.rating">—</span>
              </td>
              <td>
                <button class="btn btn-secondary btn-sm" (click)="openEdit(d)">Edit</button>
                <button class="btn btn-danger btn-sm" (click)="delete(d.doctorId)">Delete</button>
              </td>
            </tr>
          </tbody>
        </table>
        </div>
      </div>
    </div>
</div>
