<div class="admin-layout">

  <aside class="sidebar">
    <h2 class="sidebar-title">Admin Panel</h2>
    <nav>
      <a routerLink="/admin/users" routerLinkActive="active">
        <i class="fas fa-users"></i> Users
      </a>
      <a routerLink="/admin/doctors" routerLinkActive="active">
        <i class="fas fa-user-doctor"></i> Doctors
      </a>
      <a routerLink="/admin/specializations" routerLinkActive="active">
        <i class="fas fa-briefcase-medical"></i> Specializations
      </a>
      <a routerLink="/admin/appointments" routerLinkActive="active">
        <i class="fas fa-calendar"></i> Appointments
      </a>
    </nav>
  </aside>

  <div class="admin-main">
    <h1 class="page-title">
      <i class="fas fa-shield-halved"></i> Admin Dashboard
    </h1>

    <div class="stats-grid">
      <div class="stat-card">
        <i class="fas fa-users stat-icon"></i>
        <div class="stat-number">{{ stats.users }}</div>
        <div class="stat-label">Total Users</div>
      </div>
      <div class="stat-card">
        <i class="fas fa-user-doctor stat-icon"></i>
        <div class="stat-number">{{ stats.doctors }}</div>
        <div class="stat-label">Total Doctors</div>
      </div>
      <div class="stat-card">
        <i class="fas fa-briefcase-medical stat-icon"></i>
        <div class="stat-number">{{ stats.specializations }}</div>
        <div class="stat-label">Specializations</div>
      </div>
      <div class="stat-card">
        <i class="fas fa-calendar-check stat-icon"></i>
        <div class="stat-number">{{ stats.appointments }}</div>
        <div class="stat-label">Total Appointments</div>
      </div>
    </div>

    <p class="muted" style="margin-top: 1.5rem;">
      Select a section from the sidebar to manage records.
    </p>
  </div>

</div>
